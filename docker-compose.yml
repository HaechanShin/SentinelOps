x-ai-environment: &ai-environment
  AI_PROVIDER: ${AI_PROVIDER:-anthropic}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  ANTHROPIC_MAX_RETRIES: ${ANTHROPIC_MAX_RETRIES:-3}
  LOCAL_LLM_BACKEND: ${LOCAL_LLM_BACKEND:-ollama}
  LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
  LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-ollama}
  LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-qwen3.6:latest}
  LOCAL_LLM_TEMPERATURE: ${LOCAL_LLM_TEMPERATURE:-0.2}
  LOCAL_LLM_CONTEXT_TOKENS: ${LOCAL_LLM_CONTEXT_TOKENS:-16384}
  LOCAL_LLM_TOP_P: ${LOCAL_LLM_TOP_P:-0.9}
  LOCAL_LLM_TOP_K: ${LOCAL_LLM_TOP_K:-20}
  LOCAL_LLM_MIN_P: ${LOCAL_LLM_MIN_P:-0.0}
  LOCAL_LLM_REPEAT_PENALTY: ${LOCAL_LLM_REPEAT_PENALTY:-1.05}
  LOCAL_LLM_PRESENCE_PENALTY: ${LOCAL_LLM_PRESENCE_PENALTY:-0.0}
  LOCAL_LLM_TIMEOUT_SECONDS: ${LOCAL_LLM_TIMEOUT_SECONDS:-120}
  LOCAL_LLM_MAX_RETRIES: ${LOCAL_LLM_MAX_RETRIES:-3}
  LOCAL_LLM_KEEP_ALIVE: ${LOCAL_LLM_KEEP_ALIVE:-10m}
  LOCAL_LLM_THINK: ${LOCAL_LLM_THINK:-false}

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *ai-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    environment:
      <<: *ai-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m ingestion.scheduler

  slack-bot:
    build: .
    env_file: .env
    environment:
      <<: *ai-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m slack_app.app

  mcp-server:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn mcp_server.server:starlette_app --host 0.0.0.0 --port 8001

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelops}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
